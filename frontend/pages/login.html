<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Device Return</title>
    <link rel="stylesheet" href="/frontend/assets/css/tokens.css">
    <link rel="stylesheet" href="/frontend/assets/css/components.css">
    <link rel="stylesheet" href="/frontend/assets/css/pages.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-shell">
        <div class="card auth-card reveal">
            <div style="text-align: center; margin-bottom: 32px;">
                <div class="logo-icon" style="margin: 0 auto 16px; width: 48px; height: 48px;">
                    <i data-lucide="refresh-cw" style="width: 24px; height: 24px;"></i>
                </div>
                <h1 style="font-size: 24px; font-weight: 700;">Welcome back</h1>
                <p style="color: var(--text-muted); font-size: 14px;">Enter your credentials to access your account</p>
            </div>

            <form action="/frontend/index.html">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="admin@acme.com" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label class="form-label" style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: 12px; color: var(--brand-primary);">Forgot password?</a>
                    </div>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="remember">
                    <label for="remember" style="font-size: 14px;">Remember me for 30 days</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">
                    Sign In
                </button>
            </form>

            <div style="margin-top: 24px; text-align: center; font-size: 14px; color: var(--text-muted);">
                Don't have an account? <a href="#" style="color: var(--brand-primary); font-weight: 600;">Contact support</a>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
    <script type="module" src="/frontend/assets/js/theme.js"></script>
</body>
</html>
